name: ci

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run build
      - run: npm test

  # Aggregate gate — single stable required check `gate` (see brickhouse-tech/github-ops).
  gate:
    name: gate
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job results
        run: |
          results=($(echo '${{ toJSON(needs.*.result) }}' | jq -r '.[]'))
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "One or more jobs failed: $r"
              exit 1
            fi
          done
          echo "All jobs passed"
